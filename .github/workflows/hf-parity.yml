name: HF Parity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'cmd/mixlab/**'
      - 'train/**'
      - 'arch/**'
      - 'requirements-hf.txt'
      - '.github/workflows/hf-parity.yml'

jobs:
  export-hf-parity:
    name: export-hf parity smoke
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HF_PARITY: "1"
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HF Python dependencies
        run: |
          python -m pip install -r requirements-hf.txt
          python -c "import torch, transformers; print('torch', torch.__version__, 'transformers', transformers.__version__)"

      - name: Install MLX runtime
        run: brew install mlx

      - name: Run export-hf Go oracle tests
        run: go test ./cmd/mixlab ./train -run 'TestExportHF|TestRunExportHF|TestHFModeling' -count=1

      # Load-bearing FR-1 check: exports trained-magnitude fixtures, runs the
      # embedded modeling_mixlab.py through transformers, and asserts agreement
      # with the native MLX forward. HF_PARITY=1 plus the installed torch make
      # TestExportHFNativePythonParity execute (it skips otherwise).
      - name: Run native-vs-HF Python parity (MLX)
        env:
          HF_PARITY_PYTHON: python3
        run: go test -tags mlx ./train -run 'TestExportHFNativePythonParity|TestExportHF.*Parity|TestNativeHF.*Parity' -count=1 -v
