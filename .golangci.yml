version: "2"

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # go vet
    - ineffassign     # useless assignments
    - staticcheck     # comprehensive static analysis (includes gosimple)
    - unused          # unused code
    - gocritic        # opinionated style checks
    - misspell        # spelling in comments/strings
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters

  settings:
    gocritic:
      disabled-checks:
        - captLocal         # B, T, D, H are standard ML notation
        - exitAfterDefer    # pprof defer is intentional — profile written on normal exit

output:
  sort-results: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: "arch/"
      linters:
        - unparam
      text: "always receives"   # B, x, stream are fixed at IR build time by design
