# CI pipeline: build CLI + RunPod images, push to registry.
# Triggered on push to main.
#
# Required substitutions (set in the Cloud Build trigger):
#   _REGISTRY_PREFIX  — e.g. us-central1-docker.pkg.dev/my-project/my-repo
#   _MLX_BASE_IMAGE   — e.g. us-central1-docker.pkg.dev/my-project/my-repo/mlx-cuda:latest
#
# Optional: Docker Hub push requires a secret named "dockerhub-token"
# and _DOCKERHUB_USER substitution.

substitutions:
  _REGISTRY_PREFIX: ''
  _MLX_BASE_IMAGE: ''
  _DOCKERHUB_USER: ''

steps:
  # Build CLI image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/app.Dockerfile'
      - '--build-arg'
      - 'BASE_IMAGE=${_MLX_BASE_IMAGE}'
      - '-t'
      - '${_REGISTRY_PREFIX}/mixlab:latest'
      - '.'

  # Build RunPod image on top of CLI
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/runpod.Dockerfile'
      - '--build-arg'
      - 'APP_IMAGE=${_REGISTRY_PREFIX}/mixlab:latest'
      - '-t'
      - '${_REGISTRY_PREFIX}/mixlab:runpod'
      - '.'

  # Push to Docker Hub (optional — only runs if _DOCKERHUB_USER is set)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "${_DOCKERHUB_USER}" ]; then
          echo "Skipping Docker Hub push (_DOCKERHUB_USER not set)"
          exit 0
        fi
        echo "$$DOCKER_TOKEN" | docker login -u ${_DOCKERHUB_USER} --password-stdin
        docker tag ${_REGISTRY_PREFIX}/mixlab:latest ${_DOCKERHUB_USER}/mixlab:latest
        docker tag ${_REGISTRY_PREFIX}/mixlab:runpod ${_DOCKERHUB_USER}/mixlab:runpod
        docker push ${_DOCKERHUB_USER}/mixlab:latest
        docker push ${_DOCKERHUB_USER}/mixlab:runpod
    secretEnv: ['DOCKER_TOKEN']

images:
  - '${_REGISTRY_PREFIX}/mixlab:latest'
  - '${_REGISTRY_PREFIX}/mixlab:runpod'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-token/versions/latest
      env: 'DOCKER_TOKEN'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: '1200s'
